<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Parser — Template Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f12; --surface: #161920; --surface2: #1e2229; --border: #2a2f3a;
      --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
      --warn: #f5a623; --warn-dim: rgba(245,166,35,0.12);
      --blue: #5dade2; --blue-dim: rgba(93,173,226,0.10);
      --purple: #9b59b6; --purple-dim: rgba(155,89,182,0.12);
      --text: #e8eaf0; --text-dim: #6b7280; --text-mid: #9ca3af;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; font-size: 14px; line-height: 1.6; }
    body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px); pointer-events: none; z-index: 0; }
    .layout { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* SHARED HEADER */
    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; gap: 16px; }
    .header-left {}
    .logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    h1 { font-family: var(--mono); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
    .header-meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; }
    .status-pill { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-family: var(--mono); font-size: 11px; color: var(--text-mid); white-space: nowrap; flex-shrink: 0; }

    /* SHARED NAV */
    .nav-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .nav-link { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; transition: all 0.15s; }
    .nav-link:hover, .nav-link.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

    /* SHARED SYS-LINKS */
    .sys-links { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
    .sys-link { display: flex; align-items: center; gap: 7px; padding: 7px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-mid); text-decoration: none; transition: all 0.15s; }
    .sys-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .sys-link.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .sys-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* PAGE CONTENT */
    .intro { margin-bottom: 32px; }
    .intro p { font-size: 13px; color: var(--text-mid); line-height: 1.7; }
    .intro .note { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 8px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }

    /* Provider group */
    .provider-group { margin-bottom: 32px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .provider-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--surface); cursor: pointer; user-select: none; transition: background 0.15s; }
    .provider-header:hover { background: var(--surface2); }
    .provider-header-left { display: flex; align-items: center; gap: 12px; }
    .provider-name { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text); }
    .provider-type-badge { font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.08em; }
    .badge-elec  { background: rgba(0,229,160,0.15); color: var(--accent); border: 1px solid rgba(0,229,160,0.3); }
    .badge-gas   { background: rgba(245,166,35,0.15); color: var(--warn); border: 1px solid rgba(245,166,35,0.3); }
    .badge-water { background: rgba(93,173,226,0.15); color: var(--blue); border: 1px solid rgba(93,173,226,0.3); }
    .provider-variant-count { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
    .provider-toggle { font-family: var(--mono); font-size: 12px; color: var(--text-dim); transition: transform 0.2s; display: inline-block; }
    .provider-toggle.open { transform: rotate(90deg); }
    .provider-body { display: none; border-top: 1px solid var(--border); }
    .provider-body.open { display: block; }

    /* Variant grid */
    .variant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0; }
    .variant-card { padding: 20px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .variant-card:last-child { border-right: none; }
    @media(max-width: 600px) { .variant-grid { grid-template-columns: 1fr; } .variant-card { border-right: none; } }
    .variant-label { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .variant-badge { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); margin-bottom: 12px; letter-spacing: 0.06em; }
    .variant-badge.new { background: var(--purple-dim); border-color: rgba(155,89,182,0.4); color: var(--purple); }

    /* Thumbnail */
    .thumbnail-wrap { position: relative; width: 100%; aspect-ratio: 8.5/11; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 12px; cursor: pointer; }
    .thumbnail-wrap:hover { border-color: var(--accent); }
    .thumbnail-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .thumbnail-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-family: var(--mono); font-size: 11px; text-align: center; gap: 8px; padding: 20px; }
    .thumbnail-placeholder-icon { font-size: 32px; opacity: 0.4; }
    .thumbnail-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
    .thumbnail-wrap:hover .thumbnail-overlay { background: rgba(0,0,0,0.4); }
    .thumbnail-overlay-text { font-family: var(--mono); font-size: 11px; color: white; opacity: 0; transition: opacity 0.2s; letter-spacing: 0.08em; text-transform: uppercase; }
    .thumbnail-wrap:hover .thumbnail-overlay-text { opacity: 1; }

    .variant-notes { font-size: 12px; color: var(--text-mid); line-height: 1.6; }
    .variant-filename { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 8px; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 24px; }
    .lightbox.open { display: flex; }
    .lightbox-inner { position: relative; max-width: 800px; max-height: 90vh; width: 100%; }
    .lightbox-img { width: 100%; max-height: 85vh; object-fit: contain; border-radius: 6px; display: block; }
    .lightbox-label { font-family: var(--mono); font-size: 12px; color: var(--text-mid); margin-top: 12px; text-align: center; }
    .lightbox-close { position: absolute; top: -16px; right: -16px; width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: var(--mono); font-size: 14px; color: var(--text); transition: all 0.15s; }
    .lightbox-close:hover { border-color: var(--accent); color: var(--accent); }

    /* Stats bar */
    .stats-bar { display: flex; gap: 24px; margin-bottom: 28px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; flex-wrap: wrap; }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-num { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--accent); line-height: 1; }
    .stat-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

    /* Loading */
    .loading { text-align: center; padding: 40px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

    footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-dim); display: flex; justify-content: space-between; }
  </style>
</head>
<body>
<div class="layout">

  <!-- SHARED HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">// bill parsing system</div>
      <h1>Template Library</h1>
      <div class="header-meta">Known bill formats and structural variants by provider</div>
    </div>
    <div class="status-pill">Reference</div>
  </div>

  <!-- SHARED NAV -->
  <div class="nav-bar">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="how-it-works.html" class="nav-link">How It Works</a>
    <a href="calculations.html" class="nav-link">Calculations</a>
    <a href="templates.html" class="nav-link active">Templates</a>
  </div>

  <!-- SHARED SYS-LINKS -->
  <div class="sys-links">
    <a id="link-drive" href="#" class="sys-link disabled" target="_blank" title="Available after first run">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 2L2 10.4l4.4 7.6h11.2L22 10.4 17.4 2H6.6zm-.9 15L2 10.4 6.6 3h10.8l4.6 7.4-4.1 7H5.7zm5.3-1.5l-4.1-7.1h8.2l-4.1 7.1z"/></svg>
      Google Drive
    </a>
    <a id="link-sheet" href="#" class="sys-link disabled" target="_blank" title="Available after first run">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      Google Sheet
    </a>
    <a href="https://github.com/keyona-rerev/TESTER_Resource-Bill-Parser-Github" class="sys-link" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0112 6.8c.85.004 1.71.11 2.51.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0022 12c0-5.52-4.48-10-10-10z"/></svg>
      GitHub Repo
    </a>
    <a href="https://script.google.com/u/0/home/projects/1Jyn4vZQRlYBabMchIkuPTPfOgaEUU54-WYCwWVSaIC2ADmTbGTOMLEhB/edit" class="sys-link" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5c0 .83-.67 1.5-1.5 1.5S12 16.33 12 15.5v-7c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v7zm-4 0c0 .83-.67 1.5-1.5 1.5S8 16.33 8 15.5v-3c0-.83.67-1.5 1.5-1.5S11 11.67 11 12.5v3zm8 0c0 .83-.67 1.5-1.5 1.5S16 16.33 16 15.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5z"/></svg>
      Apps Script
    </a>
  </div>

  <!-- PAGE CONTENT -->
  <div id="main-content">
    <div class="loading">Loading template library...</div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <div class="lightbox-close" onclick="closeLightbox()">✕</div>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <div class="lightbox-label" id="lightbox-label"></div>
  </div>
</div>

<script>
const MANIFEST_URL = 'data/templates.json';
const FINGERPRINTS_URL = 'data/fingerprints.json';
const BILLS_URL = 'data/bills.json';

const BILL_TYPE_ORDER = ['Electricity', 'NaturalGas', 'Water'];
const BILL_TYPE_LABELS = { Electricity: 'Electricity', NaturalGas: 'Natural Gas', Water: 'Water' };
const BADGE_CLASS = { Electricity: 'badge-elec', NaturalGas: 'badge-gas', Water: 'badge-water' };

const VARIANT_LABELS = {
  standard: 'Standard',
  rate_change_period: 'Rate Change Period',
  multi_page_charges: 'Multi-Page Charges',
  estimated_read: 'Estimated Read',
  tou_pricing: 'TOU Pricing',
  tiered_pricing: 'Tiered Pricing',
  unknown: 'Unknown / New'
};

function openLightbox(src, label) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-label').textContent = label;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('open');
  }
}

function toggleProvider(id) {
  const body = document.getElementById('body-' + id);
  const toggle = document.getElementById('toggle-' + id);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function badgeClass(bt) { return BADGE_CLASS[bt] || 'badge-elec'; }
function btLabel(bt) { return BILL_TYPE_LABELS[bt] || bt; }
function variantLabel(v) { return VARIANT_LABELS[v] || v; }

function renderCard(fp, manifest) {
  const manifestEntry = manifest ? manifest.find(m =>
    m.provider === fp.provider && m.variant === variantLabel(fp.layoutVariant)
  ) : null;

  const imgPath = manifestEntry ? manifestEntry.imagePath : null;
  const label = manifestEntry ? manifestEntry.label : (fp.provider + ' — ' + variantLabel(fp.layoutVariant));
  const isUnknown = fp.layoutVariant === 'unknown';

  const thumbnailHtml = imgPath
    ? `<div class="thumbnail-wrap" onclick="openLightbox('${imgPath}', '${label.replace(/'/g,"\\'")}')">
        <img src="${imgPath}" alt="${label}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'thumbnail-placeholder\\'><div class=\\'thumbnail-placeholder-icon\\'>📄</div><span>Thumbnail not yet rendered</span><span style=\\'font-size:10px;margin-top:4px\\'>Run Bill Parser → Render Template Thumbnails</span></div>'">
        <div class="thumbnail-overlay"><span class="thumbnail-overlay-text">View full size</span></div>
      </div>`
    : `<div class="thumbnail-wrap" style="cursor:default">
        <div class="thumbnail-placeholder">
          <div class="thumbnail-placeholder-icon">📄</div>
          <span>Thumbnail not yet rendered</span>
          <span style="font-size:10px;margin-top:4px">Run Bill Parser → Render Template Thumbnails</span>
        </div>
      </div>`;

  const notes = fp.layoutNotes || 'Standard layout for this provider.';

  return `<div class="variant-card">
    <div class="variant-label">${label}</div>
    <div class="variant-badge${isUnknown ? ' new' : ''}">${variantLabel(fp.layoutVariant)}</div>
    ${thumbnailHtml}
    <div class="variant-notes">${notes}</div>
    <div class="variant-filename">${fp.filename}</div>
  </div>`;
}

function render(fingerprints, manifest) {
  // Group by billType, then provider
  const byType = { Electricity: {}, NaturalGas: {}, Water: {} };
  let totalVariants = 0;
  let totalProviders = 0;

  Object.entries(fingerprints).forEach(([provider, fps]) => {
    fps.forEach(fp => {
      const bt = fp.billType;
      if (!byType[bt]) byType[bt] = {};
      if (!byType[bt][provider]) byType[bt][provider] = [];
      byType[bt][provider].push(fp);
      totalVariants++;
    });
  });

  // Count unique providers
  const allProviders = new Set(Object.keys(fingerprints));
  totalProviders = allProviders.size;

  let html = `<div class="intro">
    <p>This library shows every known bill format the system has encountered or been pre-loaded with. When a new format arrives that doesn't match any entry here, a <strong>Template Variation Detected</strong> email fires automatically. New fingerprints are stored in <code>data/fingerprints.json</code>.</p>
    <div class="note">Thumbnails are generated by running <strong>Bill Parser → Render Template Thumbnails</strong> from the Google Sheet menu. Run this once after setup, and again whenever new sample bills are added.</div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num">${totalProviders}</div><div class="stat-label">Providers</div></div>
    <div class="stat-item"><div class="stat-num">${totalVariants}</div><div class="stat-label">Known Variants</div></div>
    <div class="stat-item"><div class="stat-num">${manifest ? manifest.length : 0}</div><div class="stat-label">Thumbnails Rendered</div></div>
  </div>`;

  BILL_TYPE_ORDER.forEach(bt => {
    const providers = byType[bt];
    if (!providers || Object.keys(providers).length === 0) return;

    html += `<div style="margin-bottom:12px;font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim)">${btLabel(bt)}</div>`;

    Object.entries(providers).forEach(([provider, fps], idx) => {
      const groupId = (bt + '_' + provider).replace(/[^a-zA-Z0-9]/g, '_');
      const variantCount = fps.length;
      html += `<div class="provider-group">
        <div class="provider-header" onclick="toggleProvider('${groupId}')">
          <div class="provider-header-left">
            <span class="provider-name">${provider}</span>
            <span class="provider-type-badge ${badgeClass(bt)}">${btLabel(bt)}</span>
            <span class="provider-variant-count">${variantCount} variant${variantCount !== 1 ? 's' : ''}</span>
          </div>
          <span class="provider-toggle${idx === 0 ? ' open' : ''}" id="toggle-${groupId}">▶</span>
        </div>
        <div class="provider-body${idx === 0 ? ' open' : ''}" id="body-${groupId}">
          <div class="variant-grid">
            ${fps.map(fp => renderCard(fp, manifest)).join('')}
          </div>
        </div>
      </div>`;
    });
  });

  html += `<footer><span>Bill Parsing System v1.0</span><span>Template Library</span></footer>`;
  document.getElementById('main-content').innerHTML = html;
}

async function loadLinks() {
  try {
    const res = await fetch(BILLS_URL + '?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    if (!data.links) return;
    const { driveFolder, googleSheet } = data.links;
    if (driveFolder) { document.getElementById('link-drive').href = driveFolder; document.getElementById('link-drive').classList.remove('disabled'); document.getElementById('link-drive').removeAttribute('title'); }
    if (googleSheet) { document.getElementById('link-sheet').href = googleSheet; document.getElementById('link-sheet').classList.remove('disabled'); document.getElementById('link-sheet').removeAttribute('title'); }
  } catch(e) {}
}

async function load() {
  try {
    const [fpRes, manifestRes] = await Promise.all([
      fetch(FINGERPRINTS_URL + '?t=' + Date.now()),
      fetch(MANIFEST_URL + '?t=' + Date.now()).catch(() => null)
    ]);
    if (!fpRes.ok) throw new Error('Could not load fingerprints.json');
    const fingerprints = await fpRes.json();
    const manifest = manifestRes && manifestRes.ok ? await manifestRes.json() : null;
    render(fingerprints, manifest);
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:40px;font-family:var(--mono);font-size:12px;color:var(--text-dim)">Could not load template library.<br><span style="font-size:11px;margin-top:8px;display:block">${e.message}</span></div>`;
  }
}

load();
loadLinks();
</script>
</body>
</html>
