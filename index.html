<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Parser — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f12; --surface: #161920; --surface2: #1e2229; --border: #2a2f3a;
      --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
      --warn: #f5a623; --warn-dim: rgba(245,166,35,0.12);
      --danger: #e74c3c; --danger-dim: rgba(231,76,60,0.12);
      --text: #e8eaf0; --text-dim: #6b7280; --text-mid: #9ca3af;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; font-size: 14px; line-height: 1.6; }
    body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px); pointer-events: none; z-index: 0; }
    .layout { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; gap: 16px; }
    .logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    h1 { font-family: var(--mono); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
    .header-meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; }
    .status-pill { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-family: var(--mono); font-size: 11px; color: var(--text-mid); white-space: nowrap; }
    .pulse { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

    /* Nav */
    .nav-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .nav-link { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; transition: all 0.15s; }
    .nav-link:hover, .nav-link.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

    /* System links bar */
    .sys-links { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
    .sys-link { display: flex; align-items: center; gap: 7px; padding: 7px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-mid); text-decoration: none; transition: all 0.15s; }
    .sys-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .sys-link.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .sys-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 32px; }
    @media(max-width:800px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; transition: border-color 0.2s; }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card.warn { border-color: var(--warn); background: var(--warn-dim); }
    .stat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .stat-value { font-family: var(--mono); font-size: 30px; font-weight: 600; line-height: 1; }
    .stat-value.accent { color: var(--accent); } .stat-value.warn { color: var(--warn); }
    .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    /* Last file */
    .last-file-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 12px; }
    .last-file-label { color: var(--text-dim); white-space: nowrap; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .last-file-name { color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .last-file-time { color: var(--text-dim); white-space: nowrap; }

    /* Section headers */
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .section-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-count { font-family: var(--mono); font-size: 11px; color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 7px; }

    /* Review Queue */
    .review-section { margin-bottom: 32px; }
    .review-empty { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
    .review-item { background: var(--warn-dim); border: 1px solid var(--warn); border-radius: 8px; padding: 14px 18px; margin-bottom: 8px; display: grid; grid-template-columns: 40px 1fr auto; gap: 12px; align-items: center; }
    .review-row-num { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--warn); }
    .review-filename { font-family: var(--mono); font-size: 12px; color: var(--text); margin-bottom: 2px; }
    .review-reason { font-size: 11px; color: var(--text-mid); }
    .review-date { font-family: var(--mono); font-size: 10px; color: var(--text-dim); white-space: nowrap; }

    /* Bills table */
    .bills-section { margin-bottom: 32px; }
    .bills-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
    .bills-table th { text-align: left; padding: 8px 12px; color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 500; }
    .bills-table td { padding: 10px 12px; border-bottom: 1px solid rgba(42,47,58,0.5); vertical-align: middle; }
    .bills-table tr:hover td { background: var(--surface2); }
    .row-num { color: var(--text-dim); font-size: 11px; }
    .bill-type-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; letter-spacing: 0.05em; }
    .badge-electricity { background: rgba(52,152,219,0.15); color: #5dade2; border: 1px solid rgba(52,152,219,0.3); }
    .badge-gas { background: rgba(241,196,15,0.15); color: #f4d03f; border: 1px solid rgba(241,196,15,0.3); }
    .badge-water { background: rgba(26,188,156,0.15); color: #48c9b0; border: 1px solid rgba(26,188,156,0.3); }
    .outcome-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; }
    .outcome-ok { background: var(--accent-dim); color: var(--accent); }
    .outcome-flag { background: var(--warn-dim); color: var(--warn); }
    .file-link { color: var(--accent); text-decoration: none; opacity: 0.8; transition: opacity 0.15s; }
    .file-link:hover { opacity: 1; text-decoration: underline; }
    .no-data { text-align: center; color: var(--text-dim); padding: 32px; font-size: 12px; }

    .loading { text-align: center; padding: 60px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
    .loading-bar { width: 200px; height: 2px; background: var(--border); margin: 16px auto 0; border-radius: 2px; overflow: hidden; }
    .loading-progress { height: 100%; background: var(--accent); animation: loading 1.5s infinite; }
    @keyframes loading { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
    .error-state { text-align: center; padding: 40px; font-family: var(--mono); font-size: 12px; color: var(--danger); }
    footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-dim); display: flex; justify-content: space-between; }
  </style>
</head>
<body>
<div class="layout">

  <div class="header">
    <div class="header-left">
      <div class="logo">// bill parsing system</div>
      <h1>Dashboard</h1>
      <div class="header-meta" id="last-updated">Loading...</div>
    </div>
    <div class="status-pill">
      <div class="pulse"></div>
      <span id="status-text">Live</span>
    </div>
  </div>

  <!-- Page nav -->
  <div class="nav-bar">
    <a href="index.html" class="nav-link active">Dashboard</a>
    <a href="how-it-works.html" class="nav-link">How It Works</a>
    <a href="calculations.html" class="nav-link">Calculations</a>
  </div>

  <!-- System quick-links -->
  <div class="sys-links">
    <a id="link-drive" href="#" class="sys-link disabled" target="_blank" title="Available after first run">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 2L2 10.4l4.4 7.6h11.2L22 10.4 17.4 2H6.6zm-.9 15L2 10.4 6.6 3h10.8l4.6 7.4-4.1 7H5.7zm5.3-1.5l-4.1-7.1h8.2l-4.1 7.1z"/></svg>
      Google Drive
    </a>
    <a id="link-sheet" href="#" class="sys-link disabled" target="_blank" title="Available after first run">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      Google Sheet
    </a>
    <a href="https://github.com/keyona-rerev/TESTER_Resource-Bill-Parser-Github" class="sys-link" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0112 6.8c.85.004 1.71.11 2.51.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0022 12c0-5.52-4.48-10-10-10z"/></svg>
      GitHub Repo
    </a>
    <a href="https://script.google.com/u/0/home/projects/1Jyn4vZQRlYBabMchIkuPTPfOgaEUU54-WYCwWVSaIC2ADmTbGTOMLEhB/edit" class="sys-link" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5c0 .83-.67 1.5-1.5 1.5S12 16.33 12 15.5v-7c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v7zm-4 0c0 .83-.67 1.5-1.5 1.5S8 16.33 8 15.5v-3c0-.83.67-1.5 1.5-1.5S11 11.67 11 12.5v3zm8 0c0 .83-.67 1.5-1.5 1.5S16 16.33 16 15.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5z"/></svg>
      Apps Script
    </a>
  </div>

  <div id="main-content">
    <div class="loading">Fetching data...<div class="loading-bar"><div class="loading-progress"></div></div></div>
  </div>

</div>
<script>
const DATA_URL = 'data/bills.json';
const REFRESH_INTERVAL = 60000;

function fmt(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString('en-CA',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e){return iso;}
}
function fmtShort(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e){return iso;}
}
function badgeClass(t) {
  if (!t) return '';
  const l = t.toLowerCase();
  if (l==='electricity') return 'badge-electricity';
  if (l==='naturalgas'||l==='natural gas') return 'badge-gas';
  if (l==='water') return 'badge-water';
  return '';
}
function badgeLabel(t) { if (!t) return '—'; if (t==='NaturalGas') return 'Gas'; return t; }

function renderSysLinks(links) {
  if (!links) return;
  const drive = document.getElementById('link-drive');
  const sheet = document.getElementById('link-sheet');
  if (links.driveFolder) {
    drive.href = links.driveFolder;
    drive.classList.remove('disabled');
    drive.removeAttribute('title');
  }
  if (links.googleSheet) {
    sheet.href = links.googleSheet;
    sheet.classList.remove('disabled');
    sheet.removeAttribute('title');
  }
}

function renderDashboard(data) {
  const pending = data.summary.pendingReview;
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total Processed</div><div class="stat-value accent">${data.summary.totalProcessed}</div></div>
    <div class="stat-card"><div class="stat-label">Electricity</div><div class="stat-value">${data.summary.electricity}</div><div class="stat-sub">bills</div></div>
    <div class="stat-card"><div class="stat-label">Natural Gas</div><div class="stat-value">${data.summary.naturalGas}</div><div class="stat-sub">bills</div></div>
    <div class="stat-card"><div class="stat-label">Water</div><div class="stat-value">${data.summary.water}</div><div class="stat-sub">bills</div></div>
    <div class="stat-card${pending>0?' warn':''}"><div class="stat-label">Pending Review</div><div class="stat-value${pending>0?' warn':' accent'}">${pending}</div><div class="stat-sub">${pending>0?'action required':'all clear'}</div></div>
  </div>`;

  if (data.lastFileAdded) {
    const f = data.lastFileAdded;
    html += `<div class="last-file-bar"><span class="last-file-label">Last file added</span><a href="${f.driveLink}" class="last-file-name file-link" target="_blank">${f.filename}</a><span class="last-file-time">${fmt(f.timestamp)}</span></div>`;
  }

  html += `<div class="review-section"><div class="section-header"><div class="section-title">Review Queue</div><div class="section-line"></div><div class="section-count">${data.reviewQueue?data.reviewQueue.length:0}</div></div>`;
  if (!data.reviewQueue||data.reviewQueue.length===0) {
    html += `<div class="review-empty">✓ No bills pending review</div>`;
  } else {
    data.reviewQueue.forEach(item => {
      html += `<div class="review-item"><div class="review-row-num">#${item.rowNumber}</div><div class="review-info"><div class="review-filename"><a href="${item.driveLink}" class="file-link" target="_blank">${item.filename}</a></div><div class="review-reason">${item.reason}</div></div><div class="review-date">${fmtShort(item.dateFlagged)}</div></div>`;
    });
  }
  html += `</div>`;

  html += `<div class="bills-section"><div class="section-header"><div class="section-title">Recent Bills</div><div class="section-line"></div><div class="section-count">${data.recentBills?data.recentBills.length:0} shown</div></div>`;
  if (!data.recentBills||data.recentBills.length===0) {
    html += `<div class="no-data">No bills processed yet.</div>`;
  } else {
    html += `<table class="bills-table"><thead><tr><th>#</th><th>File</th><th>Type</th><th>Property</th><th>Processed</th><th>Status</th></tr></thead><tbody>`;
    data.recentBills.forEach(b => {
      const oc = b.outcome==='PROCESSED'?'outcome-ok':'outcome-flag';
      const ol = b.outcome==='PROCESSED'?'✓ OK':'⚠ Review';
      html += `<tr><td class="row-num">${b.rowNumber}</td><td><a href="${b.driveLink}" class="file-link" target="_blank">${b.filename}</a></td><td><span class="bill-type-badge ${badgeClass(b.billType)}">${badgeLabel(b.billType)}</span></td><td>${b.property||'—'}</td><td>${fmtShort(b.dateProcessed)}</td><td><span class="outcome-badge ${oc}">${ol}</span></td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  html += `<footer><span>Bill Parsing System v1.0</span><span>Last synced: ${fmt(data.lastUpdated)}</span></footer>`;
  return html;
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('main-content').innerHTML = renderDashboard(data);
    document.getElementById('last-updated').textContent = 'Last updated ' + fmt(data.lastUpdated);
    document.getElementById('status-text').textContent = 'Live';
    renderSysLinks(data.links);
  } catch(e) {
    if (document.getElementById('main-content').querySelector('.loading')) {
      document.getElementById('main-content').innerHTML = `<div class="error-state">Could not load dashboard data.<br><span style="color:var(--text-dim);font-size:11px;margin-top:8px;display:block">${e.message} — data/bills.json may not exist yet.</span></div>`;
    }
  }
}

loadData();
setInterval(loadData, REFRESH_INTERVAL);
</script>
</body>
</html>
